<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <div class="logo-emblem-container">
        <svg class="logo-emblem" width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer circular seal frame -->
          <circle cx="50" cy="50" r="46" class="emblem-ring" stroke="currentColor" stroke-width="3.5" />
          <circle cx="50" cy="50" r="39" class="emblem-dots" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 4" />
          
          <!-- mortar and pestle representing Amma's kitchen -->
          <!-- Mortar bowl -->
          <path d="M30 52 C30 66, 70 66, 70 52 Z" class="emblem-mortar" fill="currentColor" />
          <!-- Mortar rim -->
          <rect x="26" y="47" width="48" height="5" rx="1.5" class="emblem-mortar-rim" fill="currentColor" />
          
          <!-- Diagonal Pestle representing grinding -->
          <rect x="46" y="24" width="8" height="32" rx="4" class="emblem-pestle" fill="currentColor" transform="rotate(28 50 40)" />
          
          <!-- Guntur Chilli representing Andhra spice -->
          <path d="M26 44 C22 30, 42 22, 56 28 C60 30, 62 34, 57 34 C44 34, 32 38, 29 48 C28 51, 27 49, 26 44 Z" class="emblem-chili" fill="var(--accent)" />
          <!-- Chilli stem -->
          <path d="M23 44 C24 46, 26 47, 28 45" class="emblem-stem" stroke="#166534" stroke-width="2" stroke-linecap="round" />
          
          <!-- Academic Star representing Headmaster (strict teaching excellence) -->
          <polygon points="50,11 53,17 60,18 55,23 56,29 50,26 44,29 45,23 40,18 47,17" class="emblem-star" fill="var(--accent)" />
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-brand">HEADMASTER AMMA'S<span class="accent-dot">.</span></span>
        <span class="logo-desc">KITCHEN</span>
      </div>
    </a>


    <nav class="desktop-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/about" routerLinkActive="active">About Amma</a>
      <a routerLink="/faq" routerLinkActive="active">FAQ</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
      <a routerLink="/preorder" routerLinkActive="active" class="nav-btn">Preorder</a>
    </nav>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span class="bar" [class.open]="isMobileMenuOpen"></span>
      <span class="bar" [class.open]="isMobileMenuOpen"></span>
      <span class="bar" [class.open]="isMobileMenuOpen"></span>
    </button>
  </div>

  <div class="mobile-drawer" [class.open]="isMobileMenuOpen">
    <nav class="mobile-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/products" routerLinkActive="active" (click)="closeMobileMenu()">Products</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About Amma</a>
      <a routerLink="/faq" routerLinkActive="active" (click)="closeMobileMenu()">FAQ</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
      <a routerLink="/preorder" class="btn btn-primary" (click)="closeMobileMenu()">Preorder</a>
    </nav>
  </div>
  <div class="drawer-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
</header>
